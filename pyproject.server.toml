[project]
name = "slm-project"
version = "0.1.0"
description = "SLM phase optimizer - server deployment"
requires-python = ">=3.11"
dependencies = [
    "ipykernel>=6.30.1",
    "ipython>=9.6.0",
    "jupyterlab>=4.0.0",
    "ipywidgets>=8.0.0",
    "matplotlib>=3.10.7",
    "natsort>=8.4.0",
    "numpy>=2.3.3",
    "scipy>=1.16.2",
    "tifffile>=2026.1.14",
    "torch>=2.8.0",
]

# CUDA index — set by deploy script based on detected CUDA version
[[tool.uv.index]]
name = "pytorch-cuda"
url = "https://download.pytorch.org/whl/cu128"
explicit = true

[tool.uv.sources]
torch = [{ index = "pytorch-cuda" }]
